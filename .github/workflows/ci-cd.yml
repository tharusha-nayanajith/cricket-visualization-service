name: CI/CD with uv

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup uv with caching enabled
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      # 2. Fast dependency sync
      - name: Install dependencies
        run: uv sync --frozen

      # 3. Log in to Docker Hub (THIS WAS MISSING!)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-visualization-service:latest .

      # 5. Run Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cricket-visualization-service:latest'
          format: 'table'
          exit-code: '0' # Keeps the pipeline green!
          ignore-unfixed: true
          vuln-type: 'os,library'

      # 6. Push Docker Image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-visualization-service:latest